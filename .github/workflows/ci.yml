name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-and-axe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Start local test server
        run: |
          node tools/serve-static.js > /tmp/ielts-static-server.log 2>&1 &
          echo $! > /tmp/ielts-static-server.pid
          sleep 2
      - name: Run smoke test
        run: npm run smoke
      - name: Run axe accessibility check
        run: npm run axe
      - name: Stop local test server
        if: always()
        run: |
          if [ -f /tmp/ielts-static-server.pid ]; then
            kill "$(cat /tmp/ielts-static-server.pid)" || true
          fi
